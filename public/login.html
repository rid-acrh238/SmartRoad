<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - SmartRoad</title>
  <link rel="stylesheet" href="output.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-lg border border-gray-200 p-8">
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-3">
        <i data-lucide="lock" class="w-6 h-6"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-800">SmartRoad Admin</h2>
      <p class="text-gray-500 text-sm mt-1">Silakan masuk untuk mengelola laporan risiko jalan.</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" id="username" required placeholder="Masukkan username" class="w-full rounded-lg border border-gray-300 p-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" required placeholder="••••••••" class="w-full rounded-lg border border-gray-300 p-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm">
      </div>
      <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition-colors text-sm flex justify-center items-center gap-2">
        Masuk <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </form>
  </div>

  <script>
    lucide.createIcons();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const result = await response.json();

        if (result.success) {
          // Menyimpan token ke sessionStorage (hilang saat tab/browser ditutup)
          sessionStorage.setItem('adminToken', result.token);
          window.location.href = '/kelola';
        } else {
          alert(result.message);
        }
      } catch (error) {
        alert('Terjadi kesalahan jaringan.');
      }
    });
  </script>
</body>
</html>
